<!DOCTYPE html>
<html>
<head>
  <title>SmartHealth | Register</title>
  <link rel="stylesheet" href="assets/css/advanced-auth.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

<canvas id="particles"></canvas>

<div class="icons">
  <i class="fa-solid fa-heart-pulse"></i>
  <i class="fa-solid fa-user-doctor"></i>
  <i class="fa-solid fa-hospital"></i>
</div>

<div class="auth-container">

  <div class="auth-left">
    <h1>Create Account</h1>
    <p>Join SmartHealth Healthcare Network</p>
  </div>

  <div class="auth-right">

    <h2>Register</h2>

    <div class="input-box">
      <i class="fa-solid fa-user"></i>
      <input type="text" required>
      <label>Full Name</label>
    </div>

    <div class="input-box">
      <i class="fa-solid fa-envelope"></i>
      <input type="email" required>
      <label>Email Address</label>
    </div>

    <div class="input-box">
      <i class="fa-solid fa-phone"></i>
      <input type="tel" required>
      <label>Mobile Number</label>
    </div>

    <div class="input-box">
      <i class="fa-solid fa-lock"></i>
      <input type="password" required>
      <label>Password</label>
    </div>

    <button class="login-btn">Create Account</button>

    <p class="switch-link">
      Already have an account? <a href="login.html">Login</a>
    </p>

  </div>

</div>

<script src="assets/js/advanced-auth.js"></script>
</body>
</html>

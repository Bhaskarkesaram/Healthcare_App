<!DOCTYPE html>
<html>
<head>
  <title>Book Doctor</title>
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body>

<div class="navbar">
  <div class="logo">SmartHealth</div>
  <div>
    <a href="index.html">Home</a>
    <a href="dashboard.html">Dashboard</a>
    <a href="booking.html">Book Doctor</a>
    <a href="support.html">Support</a>
  </div>
</div>

<div class="dashboard-container">
  <h2>Search Doctor</h2>
  <input type="text" id="searchDoctor" placeholder="Search doctor..." style="padding:10px;width:300px;">

  <div class="cards" id="doctorList">
    <div class="card doctor">
      <h3>Dr. A. Kumar</h3>
      <p>Cardiologist</p>
      <button class="btn btn-primary">Book</button>
    </div>
    <div class="card doctor">
      <h3>Dr. S. Reddy</h3>
      <p>Neurologist</p>
      <button class="btn btn-primary">Book</button>
    </div>
    <div class="card doctor">
      <h3>Dr. P. Sharma</h3>
      <p>General Physician</p>
      <button class="btn btn-primary">Book</button>
    </div>
  </div>
</div>

<script>
document.getElementById("searchDoctor").addEventListener("keyup", function() {
  let value = this.value.toLowerCase();
  document.querySelectorAll(".doctor").forEach(doc => {
    doc.style.display = doc.innerText.toLowerCase().includes(value) ? "block" : "none";
  });
});
</script>

</body>
</html>
